  <script>
    const titleSteps = ["@", "@h", "@he", "@hel", "@helu", ];
    const stepDuration = 250; // 250ms pro Schritt
    const totalCycle = (titleSteps.length * 2 - 2) * stepDuration; // Gesamte Zykluszeit
    
    function updateTitle() {
      const now = Date.now();
      const cyclePosition = (now % totalCycle) / stepDuration;
      
      let stepIndex;
      if (cyclePosition < titleSteps.length) {
        // Vorwärts: @ → @h → @he → @hel → @helu
        stepIndex = Math.floor(cyclePosition);
      } else {
        // Rückwärts: @helu → @hel → @he → @h → @
        stepIndex = titleSteps.length - 1 - Math.floor(cyclePosition - titleSteps.length);
      }
      
      document.title = titleSteps[stepIndex];
    }
    
    // Sofort aktualisieren und dann alle 250ms
    updateTitle();
    setInterval(updateTitle, stepDuration);
  </script>

<script>
  const overlay = document.getElementById("entryOverlay");
  const content = document.getElementById("mainContent");
  const audio = document.getElementById("audioPlayer");
  const playPauseBtn = document.getElementById("playPauseBtn");
  const titleScroll = document.getElementById("titleScroll");
  const currentTimeDisplay = document.getElementById("currentTime");
  const durationDisplay = document.getElementById("duration");
  const progressFill = document.getElementById("progressFill");
  const progressBar = document.getElementById("progressBar");
  const volumeControl = document.getElementById("volumeControl");

  // Audio-System für maximale Browser-Kompatibilität
  let audioInitialized = false;
  let audioLoadAttempts = 0;
  const maxLoadAttempts = 3;
  
  // Audio-Einstellungen für alle Browser optimieren
  audio.preload = 'auto';
  audio.crossOrigin = 'anonymous';
  audio.defaultMuted = false;
  audio.volume = 0.6;
  
  // Audio-Initialisierung
  function initializeAudio() {
    if (audioInitialized) return Promise.resolve();
    
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        reject(new Error('Audio initialization timeout'));
      }, 10000);
      
      const onCanPlay = () => {
        clearTimeout(timeout);
        audioInitialized = true;
        console.log('Audio erfolgreich initialisiert');
        resolve();
      };
      
      const onError = (e) => {
        clearTimeout(timeout);
        console.warn('Audio-Initialisierung fehlgeschlagen:', e);
        reject(e);
      };
      
      audio.addEventListener('canplaythrough', onCanPlay, { once: true });
      audio.addEventListener('canplay', onCanPlay, { once: true });
      audio.addEventListener('error', onError, { once: true });
      
      // Audio laden
      audio.load();
    });
  }
  
  overlay.addEventListener("click", async () => {
    overlay.style.opacity = "0";
    overlay.style.pointerEvents = "none";
    content.classList.add("show");
    
    setTimeout(async () => {
      try {
        // Audio initialisieren falls noch nicht geschehen
        if (!audioInitialized) {
          await initializeAudio();
        }
        
        // Audio abspielen
        audio.muted = false;
        await audio.play();
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        titleScroll.classList.remove("paused");
        
      } catch (error) {
        console.warn('Audio-Start fehlgeschlagen:', error.message);
        
        // Retry-Mechanismus
        if (audioLoadAttempts < maxLoadAttempts) {
          audioLoadAttempts++;
          console.log(`Audio-Retry ${audioLoadAttempts}/${maxLoadAttempts}`);
          audioInitialized = false;
          setTimeout(() => {
            overlay.click();
          }, 1000);
        } else {
          console.error('Audio konnte nach mehreren Versuchen nicht gestartet werden');
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
          titleScroll.classList.remove("paused");
        }
      }
    }, 600);
  });

  playPauseBtn.addEventListener("click", async () => {
    try {
      if (audio.paused) {
        // Audio initialisieren falls nötig
        if (!audioInitialized) {
          await initializeAudio();
        }
        await audio.play();
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        titleScroll.classList.remove("paused");
      } else {
        audio.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        titleScroll.classList.add("paused");
      }
    } catch (error) {
      console.warn('Audio-Playback-Fehler:', error.message);
      // Fallback: Button-Status zurücksetzen
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
      titleScroll.classList.add("paused");
    }
  });

  audio.addEventListener("loadedmetadata", () => {
    if (audio.duration && !isNaN(audio.duration)) {
      durationDisplay.textContent = formatTime(audio.duration);
    }
  });

  // Throttle timeupdate für bessere Performance
  let lastUpdate = 0;
  audio.addEventListener("timeupdate", () => {
    const now = Date.now();
    if (now - lastUpdate < 100) return; // Max 10fps für UI-Updates
    lastUpdate = now;
    
    if (audio.duration && !isNaN(audio.duration) && audio.currentTime && !isNaN(audio.currentTime)) {
      currentTimeDisplay.textContent = formatTime(audio.currentTime);
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
    }
  });

  progressBar.addEventListener("click", (e) => {
    if (audio.duration && !isNaN(audio.duration)) {
      const rect = progressBar.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const percent = clickX / rect.width;
      audio.currentTime = percent * audio.duration;
    }
  });

  volumeControl.addEventListener("input", () => {
    audio.volume = volumeControl.value;
  });

  // Mute-Funktionalität für Lautsprecher-Button
  const volumeBtn = document.getElementById("volumeBtn");
  let isMuted = false;
  
  volumeBtn.addEventListener("click", () => {
    if (isMuted) {
      // Audio wieder einschalten
      audio.muted = false;
      volumeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
      isMuted = false;
    } else {
      // Audio stumm schalten
      audio.muted = true;
      volumeBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
      isMuted = true;
    }
  });

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }
</script>

<script>
  const text = "welcome.";
  const target = document.getElementById("typewriter");
  let index = 0;
  let isDeleting = false;

  function typeWriter() {
    if (!isDeleting && index < text.length) {
      // Schreiben
      target.innerHTML += text.charAt(index);
      index++;
      setTimeout(typeWriter, 100);
    } else if (isDeleting && index > 0) {
      // Löschen
      target.innerHTML = target.innerHTML.slice(0, -1);
      index--;
      setTimeout(typeWriter, 50); // Schneller löschen
    } else if (!isDeleting && index === text.length) {
      // Pause bevor gelöscht wird
      setTimeout(() => {
        isDeleting = true;
        typeWriter();
      }, 2000); // 2 Sekunden Pause
    } else if (isDeleting && index === 0) {
      // Pause bevor wieder geschrieben wird
      setTimeout(() => {
        isDeleting = false;
        typeWriter();
      }, 1000); // 1 Sekunde Pause
    }
  }

  // Starte Effekt wenn Overlay weg ist
  document.getElementById("entryOverlay").addEventListener("click", () => {
    setTimeout(typeWriter, 700); // Startverzögerung nach Klick
  });
</script>

<script>
  // Interaktionen sperren: Kopieren/Einfügen/Markieren/Drag/Drop
  ['copy','cut','paste','selectstart','dragstart','drop'].forEach((type) => {
    document.addEventListener(type, (event) => {
      event.preventDefault();
      event.stopPropagation();
    }, true);
  });

  // Zusätzliche Heuristik: Wenn DevTools wahrscheinlich offen sind, Inhalt überdecken
  (function setupDevtoolsShield(){
    const createShield = () => {
      let shield = document.getElementById('antiInspectOverlay');
      if (!shield) {
        shield = document.createElement('div');
        shield.id = 'antiInspectOverlay';
        shield.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:2147483646;color:#fff;display:flex;align-items:center;justify-content:center;font-family:sans-serif;';
        shield.textContent = '';
        document.body.appendChild(shield);
      }
      return shield;
    };

    const maybeDevtoolsOpen = () => {
      const threshold = 160; // typische DevTools-Leiste
      const vertical = window.outerHeight - window.innerHeight > threshold;
      const horizontal = window.outerWidth - window.innerWidth > threshold;
      return vertical || horizontal;
    };

    let active = false;
    setInterval(() => {
      const open = maybeDevtoolsOpen();
      if (open && !active) {
        createShield().style.display = 'flex';
        active = true;
      } else if (!open && active) {
        const el = document.getElementById('antiInspectOverlay');
        if (el) el.style.display = 'none';
        active = false;
      }
    }, 600);
  })();
</script>

<script>
  // Basis-Schutz: Rechtsklick & übliche DevTools-/Quelltext-Shortcuts blockieren
  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });

  document.addEventListener('keydown', (event) => {
    const key = (event.key || '').toUpperCase();

    // F12 (DevTools)
    if (key === 'F12') {
      event.preventDefault();
      event.stopPropagation();
      return;
    }

    // Ctrl+Shift+I/J/C (DevTools Varianten)
    if (event.ctrlKey && event.shiftKey && ['I','J','C'].includes(key)) {
      event.preventDefault();
      event.stopPropagation();
      return;
    }

    // Ctrl+U (Seitenquelltext), Ctrl+S (Speichern), Ctrl+P (Drucken)
    if (event.ctrlKey && ['U','S','P'].includes(key)) {
      event.preventDefault();
      event.stopPropagation();
      return;
    }
  }, true);

  // Optional: wiederholter Fokus-Diebstahl von Konsole verhindern (sehr begrenzt wirksam)
  // Hinweis: Client-seitige Maßnahmen sind umgehbar und bieten keinen echten Schutz.
</script>
<script>
  // Erweiterte Audio-Performance und Fehlerbehandlung
  audio.addEventListener('error', (e) => {
    console.warn('Audio-Fehler:', e);
    audioInitialized = false;
  });
  
  audio.addEventListener('stalled', () => {
    console.warn('Audio-Stream unterbrochen - versuche Neuladen...');
    audioInitialized = false;
    audio.load();
  });
  
  audio.addEventListener('waiting', () => {
    console.log('Audio buffert...');
  });
  
  audio.addEventListener('canplay', () => {
    console.log('Audio kann abgespielt werden');
  });
  
  audio.addEventListener('loadstart', () => {
    console.log('Audio-Laden gestartet');
  });
  
  audio.addEventListener('loadeddata', () => {
    console.log('Audio-Daten geladen');
  });
  
  audio.addEventListener('progress', () => {
    console.log('Audio-Laden: ' + Math.round((audio.buffered.end(0) / audio.duration) * 100) + '%');
  });
  
  // Browser-spezifische Optimierungen
  if (navigator.userAgent.includes('Firefox')) {
    audio.preload = 'metadata';
  } else if (navigator.userAgent.includes('Safari')) {
    audio.preload = 'auto';
  }
</script>

<script>
  // Sterne-Hintergrund generieren
  function createStars() {
    const starsContainer = document.getElementById('stars');
    const numStars = 150;
    const numMovingStars = 20;
    
    // Statische Sterne erstellen
    for (let i = 0; i < numStars; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      
      // Zufällige Position
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      
      // Zufällige Größe (1-3px)
      const size = Math.random() * 2 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      
      // Zufällige Animation-Delay
      star.style.animationDelay = Math.random() * 3 + 's';
      
      starsContainer.appendChild(star);
    }
    
    // Bewegliche Sterne erstellen
    function createMovingStar() {
      const movingStar = document.createElement('div');
      movingStar.className = 'moving-star';
      
      // Zufällige Startposition (links außerhalb)
      movingStar.style.left = '-100px';
      movingStar.style.top = Math.random() * window.innerHeight + 'px';
      
      // Zufällige Größe (1-2px)
      const size = Math.random() * 1 + 1;
      movingStar.style.width = size + 'px';
      movingStar.style.height = size + 'px';
      
      // Zufällige Animation-Dauer (15-25s)
      const duration = Math.random() * 10 + 15;
      movingStar.style.animationDuration = duration + 's';
      
      starsContainer.appendChild(movingStar);
      
      // Stern nach Animation entfernen
      setTimeout(() => {
        if (movingStar.parentNode) {
          movingStar.parentNode.removeChild(movingStar);
        }
      }, duration * 1000);
    }
    
    // Regelmäßig neue bewegliche Sterne erstellen
    setInterval(createMovingStar, 2000);
    
    // Initial einige bewegliche Sterne erstellen
    for (let i = 0; i < numMovingStars; i++) {
      setTimeout(createMovingStar, i * 1000);
    }
  }
  
  // Sterne beim Laden der Seite erstellen
  createStars();
</script>
</body>
</html>
