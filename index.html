  <script>
    const titleSteps = ["h", "he", "hel", "helu", ];
    let i = 0;
    let forward = true;

    setInterval(() => {
      document.title = titleSteps[i];
      if (forward) {
        i++;
        if (i === titleSteps.length) {
          i -= 2;
          forward = false;
        }
      } else {
        i--;
        if (i < 0) {
          i = 1;
          forward = true;
        }
      }
    }, 250);

<script>
  const overlay = document.getElementById("entryOverlay");
  const content = document.getElementById("mainContent");
  const audio = document.getElementById("audioPlayer");
  const playPauseBtn = document.getElementById("playPauseBtn");
  const titleScroll = document.getElementById("titleScroll");
  const currentTimeDisplay = document.getElementById("currentTime");
  const durationDisplay = document.getElementById("duration");
  const progressFill = document.getElementById("progressFill");
  const progressBar = document.getElementById("progressBar");
  const volumeControl = document.getElementById("volumeControl");

  overlay.addEventListener("click", async () => {
    overlay.style.opacity = "0";
    overlay.style.pointerEvents = "none";
    content.classList.add("show");
    
    setTimeout(async () => {
      try {
        audio.muted = false;
        audio.volume = 0.6;
        audio.load();
        
        // Warte bis Audio geladen ist
        await new Promise((resolve, reject) => {
          const timeout = setTimeout(() => reject(new Error('Timeout')), 5000);
          audio.addEventListener('canplaythrough', () => {
            clearTimeout(timeout);
            resolve();
          }, { once: true });
          audio.addEventListener('error', () => {
            clearTimeout(timeout);
            reject(new Error('Audio load failed'));
          }, { once: true });
        });
        
        await audio.play();
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        titleScroll.classList.remove("paused");
      } catch (error) {
        console.warn('Audio konnte nicht gestartet werden:', error.message);
        // Fallback: Button trotzdem auf Pause setzen
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        titleScroll.classList.remove("paused");
      }
    }, 600);
  });

  playPauseBtn.addEventListener("click", async () => {
    try {
      if (audio.paused) {
        await audio.play();
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        titleScroll.classList.remove("paused");
      } else {
        audio.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        titleScroll.classList.add("paused");
      }
    } catch (error) {
      console.warn('Audio-Playback-Fehler:', error.message);
    }
  });

  audio.addEventListener("loadedmetadata", () => {
    if (audio.duration && !isNaN(audio.duration)) {
      durationDisplay.textContent = formatTime(audio.duration);
    }
  });

  audio.addEventListener("timeupdate", () => {
    if (audio.duration && !isNaN(audio.duration) && audio.currentTime && !isNaN(audio.currentTime)) {
      currentTimeDisplay.textContent = formatTime(audio.currentTime);
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
    }
  });

  progressBar.addEventListener("click", (e) => {
    if (audio.duration && !isNaN(audio.duration)) {
      const rect = progressBar.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const percent = clickX / rect.width;
      audio.currentTime = percent * audio.duration;
    }
  });

  volumeControl.addEventListener("input", () => {
    audio.volume = volumeControl.value;
  });

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }
</script>

<script>
  const volumeContainer = document.getElementById("volumeContainer");
  const volumeSlider = document.getElementById("volumeSlider");
  let hoverTimeout;

  volumeContainer.addEventListener("mouseenter", () => {
    clearTimeout(hoverTimeout);
    volumeSlider.style.display = "block";
  });

  volumeContainer.addEventListener("mouseleave", () => {
    hoverTimeout = setTimeout(() => {
      volumeSlider.style.display = "none";
    }, 300);
  });

  volumeSlider.addEventListener("mouseenter", () => {
    clearTimeout(hoverTimeout);
  });

  volumeSlider.addEventListener("mouseleave", () => {
    hoverTimeout = setTimeout(() => {
      volumeSlider.style.display = "none";
    }, 300);
  });
</script>

<!-- 3D Hover Effekt -->
<script>
  const hover3DContainer = document.querySelector('.hover-3d');
  const hover3DInner = document.querySelector('.hover-3d-inner');

  hover3DContainer.addEventListener('mousemove', (e) => {
    const rect = hover3DContainer.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = ((y - centerY) / centerY) * -10;
    const rotateY = ((x - centerX) / centerX) * 10;

    hover3DInner.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  hover3DContainer.addEventListener('mouseleave', () => {
    hover3DInner.style.transform = `rotateX(0deg) rotateY(0deg)`;
  });
</script>
<script>
  const text = "ops tryna catch up, but I'm gone like the wind...";
  const target = document.getElementById("typewriter");
  let index = 0;

  function typeWriter() {
    if (index < text.length) {
      target.innerHTML += text.charAt(index);
      index++;
      setTimeout(typeWriter, 100); // Schreibgeschwindigkeit
    }
  }

  // Starte Effekt wenn Overlay weg ist
  document.getElementById("entryOverlay").addEventListener("click", () => {
    setTimeout(typeWriter, 700); // Startverzögerung nach Klick
  });
</script>

<script>
  const favicon_emojis = ['🐐', '🐐', '🐐', '🐐', '🐐', '🐐'];
  let emoji_counter = 0;
  setInterval(() => {
    document.querySelectorAll("link[rel='icon'], link[rel='shortcut icon']").forEach(e => e.remove());
    const link = document.createElement('link');
    link.rel = 'icon';
    // Erstelle Data URL für Ziegen-Emoji
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    ctx.font = '24px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(favicon_emojis[emoji_counter], 16, 16);
    link.href = canvas.toDataURL();
    document.head.appendChild(link);
    emoji_counter = (emoji_counter + 1) % favicon_emojis.length;
  }, 200);
</script>

<script>
  // Interaktionen sperren: Kopieren/Einfügen/Markieren/Drag/Drop
  ['copy','cut','paste','selectstart','dragstart','drop'].forEach((type) => {
    document.addEventListener(type, (event) => {
      event.preventDefault();
      event.stopPropagation();
    }, true);
  });

  // Zusätzliche Heuristik: Wenn DevTools wahrscheinlich offen sind, Inhalt überdecken
  (function setupDevtoolsShield(){
    const createShield = () => {
      let shield = document.getElementById('antiInspectOverlay');
      if (!shield) {
        shield = document.createElement('div');
        shield.id = 'antiInspectOverlay';
        shield.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:2147483646;color:#fff;display:flex;align-items:center;justify-content:center;font-family:sans-serif;';
        shield.textContent = '';
        document.body.appendChild(shield);
      }
      return shield;
    };

    const maybeDevtoolsOpen = () => {
      const threshold = 160; // typische DevTools-Leiste
      const vertical = window.outerHeight - window.innerHeight > threshold;
      const horizontal = window.outerWidth - window.innerWidth > threshold;
      return vertical || horizontal;
    };

    let active = false;
    setInterval(() => {
      const open = maybeDevtoolsOpen();
      if (open && !active) {
        createShield().style.display = 'flex';
        active = true;
      } else if (!open && active) {
        const el = document.getElementById('antiInspectOverlay');
        if (el) el.style.display = 'none';
        active = false;
      }
    }, 600);
  })();
</script>

<script>
  // Basis-Schutz: Rechtsklick & übliche DevTools-/Quelltext-Shortcuts blockieren
  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });

  document.addEventListener('keydown', (event) => {
    const key = (event.key || '').toUpperCase();

    // F12 (DevTools)
    if (key === 'F12') {
      event.preventDefault();
      event.stopPropagation();
      return;
    }

    // Ctrl+Shift+I/J/C (DevTools Varianten)
    if (event.ctrlKey && event.shiftKey && ['I','J','C'].includes(key)) {
      event.preventDefault();
      event.stopPropagation();
      return;
    }

    // Ctrl+U (Seitenquelltext), Ctrl+S (Speichern), Ctrl+P (Drucken)
    if (event.ctrlKey && ['U','S','P'].includes(key)) {
      event.preventDefault();
      event.stopPropagation();
      return;
    }
  }, true);

  // Optional: wiederholter Fokus-Diebstahl von Konsole verhindern (sehr begrenzt wirksam)
  // Hinweis: Client-seitige Maßnahmen sind umgehbar und bieten keinen echten Schutz.
</script>
